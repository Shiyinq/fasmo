services:
  # --- GATEWAY ---
  nginx:
    image: nginx:alpine
    container_name: fasmo-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx:/etc/nginx/conf.d:ro
      - ./certbot/conf:/etc/letsencrypt
      - ./certbot/www:/var/www/certbot
      - ./logs/nginx:/var/log/nginx
    depends_on:
      - backend
      - frontend
    restart: always
    networks:
      - public_net

  # --- BACKEND ---
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: fasmo-backend
    volumes:
      - ./logs/backend:/var/log/fasmo
    env_file:
      - .env
    environment:
      MONGODB_URI: mongodb://${MONGO_ROOT_USER}:${MONGO_ROOT_PASSWORD}@mongodb:27017
      ENV: ${ENV:-prod}
    depends_on:
      mongodb:
        condition: service_started
      index-creator:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: always
    networks:
      - public_net
      - internal_net

  index-creator:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: fasmo-index-creator
    command: python scripts/create_indexes.py
    env_file:
      - .env
    environment:
      MONGODB_URI: mongodb://${MONGO_ROOT_USER}:${MONGO_ROOT_PASSWORD}@mongodb:27017
    depends_on:
      - mongodb
    networks:
      - internal_net

  # --- FRONTEND ---
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        PUBLIC_CLIENT_SIDE_API_BASE_URL: ${PUBLIC_CLIENT_SIDE_API_BASE_URL}
        PUBLIC_SERVER_SIDE_API_BASE_URL: http://backend:8000/api
    container_name: fasmo-frontend
    env_file:
      - .env
    environment:
      PORT: 5050
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:5050/health', (r) => { if (r.statusCode !== 200) process.exit(1); })"]
      interval: 60s
      timeout: 10s
      retries: 3
    restart: always
    networks:
      - public_net

  # --- DATABASE ---
  mongodb:
    image: mongo:7.0
    container_name: fasmo-mongodb
    ports:
      - "127.0.0.1:27017:27017" # Securely exposed for SSH Tunnel
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_ROOT_USER}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_ROOT_PASSWORD}
    volumes:
      - mongodb_data:/data/db
    restart: always
    networks:
      - internal_net

networks:
  public_net:
    driver: bridge
  internal_net:
    driver: bridge

volumes:
  mongodb_data:
