# FASMO Production Nginx Configuration
# Optimized for performance (Gzip, Caching)

# Gzip Compression
gzip on;
gzip_vary on;
gzip_proxied any;
gzip_comp_level 6;
gzip_types text/plain text/css text/xml application/json application/javascript application/xml+rss application/atom+xml image/svg+xml;
gzip_min_length 1000;

# Common proxy headers
proxy_set_header Host $host;
proxy_set_header X-Real-IP $remote_addr;
proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
proxy_set_header X-Forwarded-Proto $scheme;
proxy_read_timeout 300s;
proxy_connect_timeout 300s;
proxy_send_timeout 300s;
client_max_body_size 10M;

# --- HTTP SERVER ---
server {
    listen 80;
    server_name fasmo.app api.fasmo.app;

    # Handle Certbot Challenge
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Buffer for large headers (SvelteKit Cookies)
    proxy_buffer_size 128k;
    proxy_buffers 4 256k;
    proxy_busy_buffers_size 256k;

    # --- API (api.fasmo.app) ---
    if ($host = api.fasmo.app) {
        rewrite ^/(.*)$ /api/$1 last;
    }

    # API Route
    location /api/ {
        proxy_pass http://backend:8000/api/;
    }

    # Static assets caching (SvelteKit immutable assets)
    location /_app/immutable/ {
        proxy_pass http://frontend:5050;
        expires max;
        add_header Cache-Control "public, max-age=31536000, immutable";
        access_log off;
    }

    # Main App Route
    location / {
        proxy_pass http://frontend:5050;
    }
}
